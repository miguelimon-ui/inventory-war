[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/data"
  to = "/.netlify/functions/data"
  status = 200

[[redirects]]
  from = "/api/smart-suggest"
  to = "/.netlify/functions/smart-suggest"
  status = 200

[[redirects]]
  from = "/api/asana-task"
  to = "/.netlify/functions/asana-task"
  status = 200

[[redirects]]
  from = "/api/asana-tasks"
  to = "/.netlify/functions/asana-tasks"
  status = 200

[[redirects]]
  from = "/api/five-whys"
  to = "/.netlify/functions/five-whys"
  status = 200

[[redirects]]
  from = "/api/monday-gantt"
  to = "/.netlify/functions/monday-gantt"
  status = 200

[[redirects]]
  from = "/api/asana-comment"
  to = "/.netlify/functions/asana-comment"
  status = 200
